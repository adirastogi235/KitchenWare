services:
  mongo:
    image: mongo:8
    container_name: kitchenware-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build:
      context: ./backend
    image: arrastogi/kitchenware-backend:latest
    container_name: kitchenware-backend
    restart: unless-stopped
    environment:
      ENVIRONMENT: development
      MONGODB_URL: mongodb://mongo:27017
      DATABASE_NAME: rasoi_ghar
      SECRET_KEY: dev-secret-change-in-prod
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-rzp_test_placeholder}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-placeholder_secret}
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
    ports:
      - "8000:8000"
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000/api
    image: arrastogi/kitchenware-frontend:latest
    container_name: kitchenware-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo_data:
