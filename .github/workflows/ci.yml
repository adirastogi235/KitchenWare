name: CI / Build & Push

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  DOCKERHUB_USER: arrastogi

jobs:
  backend:
    name: Backend image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python (smoke test)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps & import-check
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -c "from app.main import app; print('OK', len(app.routes), 'routes')"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
          tags: |
            ${{ env.DOCKERHUB_USER }}/kitchenware-backend:latest
            ${{ env.DOCKERHUB_USER }}/kitchenware-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend:
    name: Frontend image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node (smoke test)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build frontend
        working-directory: frontend
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_API_URL: http://localhost:8000/api
        run: |
          npm ci
          npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8000/api
          tags: |
            ${{ env.DOCKERHUB_USER }}/kitchenware-frontend:latest
            ${{ env.DOCKERHUB_USER }}/kitchenware-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
